<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="../images/tittleIcon.png" type="image/x-icon" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Editor Preview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: #e7e9f2;
      --text: #121525;
      --muted: #6b7280;
      --brand: #ff2d2d;
      --brand2: #ff4a4a;
      --focus: #2b6cff;
      --shadow: 0 8px 24px rgba(18, 21, 37, .08);
      --shadow2: 0 6px 16px rgba(18, 21, 37, .10);
      --radius: 16px;
      --radius2: 12px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: linear-gradient(180deg, #fff 0%, var(--bg) 60%, var(--bg) 100%);
    }

    /* ===== Top App Bar ===== */
    .appbar {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .iconbtn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 2px 10px rgba(18, 21, 37, .05);
      cursor: pointer;
      transition: .15s transform, .15s box-shadow;
      user-select: none;
    }

    .iconbtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(18, 21, 37, .10)
    }

    .iconbtn:active {
      transform: translateY(0)
    }

    .appmark {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: #fff;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .appmark img {
      width: 100%;
      height: 100%;
    }

    .titlewrap {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .title {
      font-weight: 700
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted)
    }

    /* ===== Layout ===== */
    .layout {
      height: calc(100vh - 60px);
      display: grid;
      grid-template-columns: 68px 220px 1fr;
      gap: 12px;
      padding: 12px;
    }

    /* ===== Left tool rail ===== */
    .rail {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .rail .railbtn {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(255, 45, 45, .18);
      background: linear-gradient(180deg, #ff3a3a, #ff1f1f);
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 12px 22px rgba(255, 45, 45, .22);
      cursor: pointer;
      transition: .15s transform, .15s filter;
    }

    .rail .railbtn:hover {
      transform: translateY(-1px);
      filter: saturate(1.1)
    }

    .rail .railbtn:active {
      transform: translateY(0)
    }

    .rail .railbtn.secondary {
      background: #fff;
      color: var(--brand);
      border: 1px solid var(--line);
      box-shadow: 0 6px 14px rgba(18, 21, 37, .06);
    }

    .rail .spacer {
      flex: 1
    }

    .rail .active {
      outline: 3px solid rgba(43, 108, 255, .18);
      border-color: rgba(43, 108, 255, .30);
    }

    /* ===== Thumbnails ===== */
    .thumbs {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px;
      overflow: auto;
    }

    .thumb {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 6px 16px rgba(18, 21, 37, .06);
      margin-bottom: 12px;
      padding: 10px 10px 12px;
      cursor: pointer;
      position: relative;
      transition: .15s transform, .15s box-shadow, .15s border-color;
    }

    .thumb:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(18, 21, 37, .10)
    }

    .thumb.active {
      border-color: rgba(43, 108, 255, .55);
      box-shadow: 0 10px 28px rgba(43, 108, 255, .18);
    }

    .thumbnum {
      position: absolute;
      top: -8px;
      left: -8px;
      width: 22px;
      height: 22px;
      border-radius: 7px;
      background: #1f2937;
      color: #fff;
      font-size: 12px;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 18px rgba(0, 0, 0, .15);
    }

    .thumbpaper {
      width: 100%;
      aspect-ratio: 612 / 792;
      border-radius: 10px;
      border: 1px solid #eef0f6;
      position: relative;
      overflow: hidden;
    }

    .thumbpaper .mini-title {
      position: absolute;
      top: 10px;
      left: 0;
      right: 0;
      text-align: center;
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .2px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, .25);
      padding: 0 8px;
    }

    .thumbpaper .mini-sub {
      position: absolute;
      top: 28px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, .85);
      font-size: 9px;
      padding: 0 10px;
    }

    .thumbpaper .mini-photo {
      position: absolute;
      top: 120px;
      left: 50%;
      width: 60%;
      aspect-ratio: 1 / 1;
      transform: translateX(-50%);
      border-radius: 12px;
      border: 3px solid rgba(255, 255, 255, .9);
      box-shadow: 0 10px 30px rgba(18, 21, 37, .18);
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, .9), rgba(255, 255, 255, 0) 45%),
        linear-gradient(135deg, #8dd3ff, #0a7ea4 50%, #003d63);
    }

    .thumbpaper .mini-born {
      position: absolute;
      bottom: 34px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      color: #2b6cff;
      text-decoration: underline;
    }

    /* ===== Main viewer ===== */
    .viewer {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* top controls inside viewer */
    .viewerbar {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: linear-gradient(180deg, #fff, #fbfbfe);
    }

    .group {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .seg {
      display: flex;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 14px rgba(18, 21, 37, .05);
    }

    .seg button {
      width: 44px;
      height: 40px;
      border: 0;
      background: transparent;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .seg button:hover {
      background: #f6f7fb
    }

    .pill {
      min-width: 90px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 10px;
      box-shadow: 0 6px 14px rgba(18, 21, 37, .05);
      color: #111827;
      font-weight: 600;
    }

    .zoomwrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .zoomval {
      width: 80px;
      text-align: center;
      font-weight: 700;
      color: #111827;
    }

    /* scrollable stage */
    .stage {
      flex: 1;
      background: #f3f5fb;
      overflow: auto;
      /* REQUIRED: scrollable */
      padding: 22px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ===== PDF Canvas (fixed size min/max) ===== */
    .page {
      width: 612px;
      height: 792px;
      min-width: 612px;
      max-width: 612px;
      min-height: 792px;
      max-height: 792px;
      background: #fff;
      border: 2px solid rgba(43, 108, 255, .35);
      box-shadow: 0 18px 48px rgba(18, 21, 37, .18);
      overflow: hidden;
      position: relative;
      transform-origin: top center;
      transform-origin: top center;

    }

    /* page content (matches your screenshot style) */
    .banner {
      position: absolute;
      inset: 0 0 auto 0;
      height: 110px;
      background: linear-gradient(90deg, #0a7ea4 0%, #0aa1a3 55%, #0aa1a3 100%);
    }

    .wave {
      position: absolute;
      right: -90px;
      top: 26px;
      width: 360px;
      height: 120px;
      opacity: .55;
      background:
        radial-gradient(circle at 15% 55%, rgba(255, 255, 255, .55), rgba(255, 255, 255, 0) 55%),
        radial-gradient(circle at 45% 40%, rgba(255, 255, 255, .40), rgba(255, 255, 255, 0) 56%),
        radial-gradient(circle at 70% 60%, rgba(255, 255, 255, .28), rgba(255, 255, 255, 0) 56%);
      filter: blur(.2px);
    }

    .name {
      position: absolute;
      top: 30px;
      right: 56px;
      color: #fff;
      font-size: 40px;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: .3px;
      text-shadow: 0 3px 14px rgba(0, 0, 0, .25);
      white-space: nowrap;
    }

    .role {
      position: absolute;
      top: 78px;
      right: 60px;
      color: rgba(255, 255, 255, .90);
      font-size: 13px;
      font-weight: 600;
      text-shadow: 0 2px 12px rgba(0, 0, 0, .20);
      white-space: nowrap;
    }

    .photoFrame {
      position: absolute;
      top: 210px;
      left: 50%;
      width: 360px;
      height: 360px;
      transform: translateX(-50%);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(18, 21, 37, .20);
      border: 6px solid rgba(255, 255, 255, .95);
      overflow: hidden;
      clip-path: polygon(0% 10%, 10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%);
    }

    .photo {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, .95), rgba(255, 255, 255, 0) 46%),
        linear-gradient(135deg, #8dd3ff, #0a7ea4 50%, #003d63);
      display: grid;
      place-items: center;
      font-weight: 800;
      color: rgba(255, 255, 255, .8);
      letter-spacing: 2px;
    }

    .born {
      position: absolute;
      top: 610px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #2b6cff;
      text-decoration: underline;
      font-family: Georgia, "Times New Roman", serif;
    }

    /* small helpers */
    svg {
      display: block
    }

    .muted {
      color: var(--muted)
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 68px 200px 1fr
      }

      .name {
        font-size: 34px
      }
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 68px 1fr;
        grid-template-rows: auto 1fr
      }

      .thumbs {
        display: none
      }
    }

    /* ===== Upload Button – Special Accent ===== */
    .upload-btn {
      background: linear-gradient(135deg, #6a5cff, #4f46e5);
      border: none;
      color: #fff;
      box-shadow: 0 14px 30px rgba(79, 70, 229, .35);
    }

    .upload-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .upload-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(79, 70, 229, .28);
    }

    .text-box {
      position: absolute;
      min-width: 80px;
      padding: 4px 6px;
      font-size: 14px;
      cursor: move;
      outline: none;
    }

    .text-box {
      position: absolute;
      left: 0;
      top: 0;
      min-width: 90px;
      padding: 4px 6px;
      outline: none;
      border: none;
      background: transparent;
      cursor: move;
    }

    /* show border ONLY while editing */
    .text-box.editing {
      border: 1px dashed rgba(17, 24, 39, .25);
      background: rgba(255, 255, 255, .65);
    }

    .text-box:focus {
      border-color: rgba(79, 70, 229, .45);
      box-shadow: 0 10px 22px rgba(79, 70, 229, .14);
    }

    .text-box.placeholder {
      color: rgba(17, 24, 39, 0.45);
      font-style: italic;
    }


    .text-mode #textLayer {
      cursor: text;
    }

    /* ===== Floating Text Toolbar (modern) ===== */
    .text-floatbar {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(16px) scale(.98);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: .22s ease;
    }

    .text-floatbar.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      pointer-events: auto;
    }

    .tf-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .86);
      border: 1px solid rgba(231, 233, 242, .9);
      box-shadow: 0 18px 60px rgba(18, 21, 37, .22);
      backdrop-filter: blur(12px);
      transform-origin: bottom center;
    }

    .tf-btn {
      width: 42px;
      height: 40px;
      border-radius: 14px;
      border: 1px solid rgba(18, 21, 37, .08);
      background: linear-gradient(180deg, #fff, #f6f7fb);
      box-shadow: 0 10px 20px rgba(18, 21, 37, .08);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: .15s transform, .15s box-shadow, .15s filter;
    }

    .tf-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .tf-btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 14px rgba(18, 21, 37, .10);
    }

    .tf-btn.is-on {
      border-color: rgba(79, 70, 229, .35);
      box-shadow: 0 14px 26px rgba(79, 70, 229, .18);
    }

    .tf-sep {
      width: 1px;
      height: 26px;
      background: rgba(18, 21, 37, .10);
      margin: 0 2px;
      border-radius: 2px;
    }

    .tf-field {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid rgba(18, 21, 37, .08);
      background: linear-gradient(180deg, #fff, #f6f7fb);
      box-shadow: 0 10px 20px rgba(18, 21, 37, .06);
    }

    .tf-ico {
      font-weight: 800;
      font-size: 12px;
      color: rgba(17, 24, 39, .75);
    }

    .tf-field select {
      border: 0;
      outline: 0;
      background: transparent;
      font-weight: 700;
      font-size: 13px;
      color: #111827;
      cursor: pointer;
      appearance: none;
      padding-right: 14px;
    }

    /* tiny dropdown chevron */
    .tf-field {
      position: relative;
    }

    .tf-field::after {
      content: "";
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(17, 24, 39, .45);
      border-bottom: 2px solid rgba(17, 24, 39, .45);
      transform: rotate(45deg);
      position: absolute;
      right: 10px;
      top: 50%;
      margin-top: -6px;
      pointer-events: none;
    }

    /* make toolbar fit on small phones */
    @media (max-width: 520px) {
      .tf-inner {
        gap: 8px;
        padding: 10px;
        border-radius: 16px;
      }

      .tf-btn {
        width: 38px;
        height: 38px;
        border-radius: 12px;
      }

      .tf-field {
        padding: 7px 9px;
        border-radius: 12px;
      }

      .tf-field select {
        font-size: 12px;
      }
    }

    .tf-colorbtn {
      position: relative;
    }

    .tf-swatch {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 4px;
      border-radius: 999px;
      background: #111827;
    }

    .tf-pop {
      position: relative;
    }

    .tf-popover {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 10px;
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, .2);
      display: none;
    }

    .tf-popover.show {
      display: block;
    }

    .tf-popgrid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .tf-chip {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    /* Base hamburger */
    .menu-btn {
      position: fixed;
      top: 14px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #111;
      display: none;
      flex-direction: column;
      justify-content: center;
      border: unset;
      gap: 6px;
      padding: 10px;
      z-index: 1001;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .menu-btn span {
      height: 2px;
      width: 100%;
      background: #fff;
      border-radius: 2px;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    /* Hamburger → X animation */
    .menu-btn.active span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .menu-btn.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-btn.active span:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }

    /* Rail mobile behavior */
    @media (max-width: 720px) {
      .menu-btn {
        display: flex;
      }

      aside.rail {
        transform: translateX(-120px);
        transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 100;
        background-color: transparent;
      }

      .layout {
        grid-template-columns: 0px 1fr;
        grid-template-rows: auto 1fr;
        padding: 5px 0;
      }

      aside.rail.open {
        transform: translateX(20px);
        padding-left: 10px;
      }
    }

    @media (max-width:670px) {
      .rail .railbtn {
        width: 39px;
        height: 39px;
      }

      .seg button {
        width: 39px;
        height: 34px;
      }

      .seg svg {
        width: 16px;
        height: 16px;
      }

      .iconbtn {
        width: 30px;
        height: 30px;
      }

      .pill {
        min-width: 70px;
        height: 35px;
        gap: 5px;
      }

      .viewerbar {
        padding: 10px;
        gap: 5px;
      }

      .group {
        gap: 5px;
      }

      svg {
        width: 19px;
        height: 19px;
      }


    }

    /* Optional subtle entrance animation for buttons */
    aside.rail.open .railbtn {
      animation: popIn 0.35s ease forwards;
    }



    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateX(10px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @media (max-width:580px) {
      .tf-inner {
        gap: 5px;
      }

      .tf-inner .tf-btn {
        width: 32px;
        height: 30px;
        border-radius: 5px;
      }
    }

    @media (max-width:620px) {
      .page {
        margin-left: 15%;
      }
    }

    @media (max-width:560px) {
      .page {
        margin-left: 20vh;
      }
    }

    @media (max-width:460px) {
      .page {
        margin-left: 30vh;
      }
    }

    @media (max-width:390px) {
      .page {
        margin-left: 35vh;
      }
    }

    @media (max-width:335px) {
      .page {
        margin-left: 40vh;
      }
    }

    #uploadBtn {
      background: radial-gradient(circle at 30% 30%, #0a7ea4, rgba(255, 255, 255, 0) 45%), linear-gradient(135deg, #8dd3ff, #0a7ea4 50%, #003d63);
      ;
    }

    .thumbpaper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pdfCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #drawCanvas,
    #eraseCanvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: auto;
    }

    #textLayer {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    #textLayer {
      pointer-events: none;
    }

    .text-mode #textLayer {
      pointer-events: auto;
    }



    #page {
      transform-origin: top left;
    }

    #drawCanvas,
    #eraseCanvas {
      background: transparent;
      display: block;
    }

    .ink-size-ui {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;

      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;

      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;

      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .ink-size-ui.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(10px);
    }

    /* Slider */
    .ink-size-ui input[type="range"] {
      width: 160px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }

    /* Track */
    .ink-size-ui input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: #ffffff55;
      border-radius: 2px;
    }

    .ink-size-ui input[type="range"]::-moz-range-track {
      height: 4px;
      background: #ffffff55;
      border-radius: 2px;
    }

    /* Thumb */
    .ink-size-ui input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      margin-top: -7px;
    }

    .ink-size-ui input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
    }

    /* Value label */
    .ink-size-value {
      font-size: 12px;
      color: white;
      min-width: 40px;
      text-align: right;
    }

    .tool-btn {
      position: relative;
      border: 2px solid transparent;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .tool-btn.active {
      border-color: #00e5ff;
      /* bright cyan */
      box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.4);
    }

    .railbtn.active {
      outline: 4px solid #00e5ff;
      outline-offset: 2px;
      box-shadow:
        0 0 0 6px rgba(0, 229, 255, 0.35),
        0 10px 30px rgba(0, 229, 255, 0.45);
    }

    .viewerbar {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    /* prevent inner groups from shrinking */
    .viewerbar .group {
      flex: 0 0 auto;
    }

    /* optional: hide scrollbar but keep scroll */
    .viewerbar::-webkit-scrollbar {
      height: 6px;
    }

    .viewerbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, .2);
      border-radius: 6px;
    }

    @media (max-width: 600px) {
      .viewerbar {
        overflow-x: auto;
        white-space: nowrap;
      }
    }

    /* Modern green Save button */
    #saveBtn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 6px 16px rgba(34, 197, 94, 0.35);
      transition: all 0.2s ease;
    }

    /* icon stroke color */
    #saveBtn svg path {
      stroke: white;
    }

    /* hover */
    #saveBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(34, 197, 94, 0.45);
    }

    /* active / pressed */
    #saveBtn:active {
      transform: translateY(0);
      box-shadow: 0 4px 10px rgba(34, 197, 94, 0.35);
    }

    /* keyboard focus */
    #saveBtn:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 3px rgba(34, 197, 94, 0.35),
        0 3px 5px rgba(34, 197, 94, 0.45);
    }

    /* =========================
   Modern Toast Notification
   ========================= */
    /* =========================
   MODERN RESPONSIVE TOAST
   ========================= */

    .toast {
      position: fixed;
      z-index: 9999;

      /* desktop position */
      right: 20px;
      bottom: 20px;

      max-width: 380px;
      width: calc(100vw - 40px);

      background: #0f172a;
      color: #fff;

      display: flex;
      align-items: center;
      gap: 14px;

      padding: 14px 16px;
      border-radius: 14px;

      box-shadow:
        0 10px 30px rgba(0, 0, 0, .25),
        inset 0 0 0 1px rgba(255, 255, 255, .06);

      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;

      transform: translateY(20px) scale(.96);
      opacity: 0;
      pointer-events: none;

      transition:
        transform .35s cubic-bezier(.2, .8, .2, 1),
        opacity .25s ease;
    }

    /* visible */
    .toast.show {
      transform: translateY(0) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    /* icon */
    .toast .icon {
      width: 36px;
      height: 36px;
      min-width: 36px;

      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 10px;

      display: grid;
      place-items: center;
    }

    .toast .icon svg {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    /* text */
    .toast .content {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .toast .title {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.3;
    }

    .toast .desc {
      font-size: 13px;
      opacity: .85;
      line-height: 1.35;
      word-wrap: break-word;
    }

    /* =========================
   MOBILE BEHAVIOUR
   ========================= */
    @media (max-width: 640px) {
      .toast {
        left: 50%;
        right: auto;
        bottom: 16px;

        transform: translate(-50%, 20px) scale(.96);
        width: calc(100vw - 24px);
        max-width: 520px;
        border-radius: 16px;
      }

      .toast.show {
        transform: translate(-50%, 0) scale(1);
      }
    }

    /* =========================
   SAFE AREA (iPhone notch)
   ========================= */
    @supports (padding: max(0px)) {
      .toast {
        bottom: max(20px, env(safe-area-inset-bottom));
      }
    }

    #imageLayer {
      position: absolute;
      inset: 0;
      z-index: 4;
      /* above PDF, below text */
      pointer-events: auto;
    }

    .image-item {
      position: absolute;
      cursor: move;
      user-select: none;
    }

    .image-item img {
      display: block;
      width: 100%;
      height: 100%;
    }

    .image-resizer {
      position: absolute;
      right: -6px;
      bottom: -6px;
      width: 12px;
      height: 12px;
      background: #00e5ff;
      border-radius: 50%;
      cursor: se-resize;
    }

    .image-resizer {
      touch-action: none;
      /* 🔥 REQUIRED */
    }


    #imageLayer {
      pointer-events: none;
    }

    .image-item,
    .text-box {
      pointer-events: auto;
    }

    .image-item.selected {
      outline: 2px solid #00e5ff;
      outline-offset: 2px;
    }

    .image-item {
      position: absolute;
    }

    /* OPTIONAL: if you want NO outline at all when not selected */
    .image-item:not(.selected) {
      outline: none;
    }

    .image-rotate-btn {
      position: absolute;
      top: -12px;
      left: -12px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .25);
      font-size: 14px;
      line-height: 1;
    }

    /* show rotate button only when image is selected */
    .image-item.selected .image-rotate-btn {
      display: flex;
    }

    /* =========================
   ROTATE HANDLE – MODERN UI
   ========================= */

    .image-rotate-handle,
    .image-delete-btn {

      /* ---- Layout ---- */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;

      width: 34px;
      height: 34px;

      cursor: grab;
      user-select: none;

      /* ---- Glass Surface ---- */
      background: linear-gradient(145deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.02));

      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      border-radius: 12px;

      border: 1px solid rgba(255, 255, 255, 0.08);

      /* ---- Depth ---- */
      box-shadow:
        0 6px 18px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);

      /* ---- Motion ---- */
      transition:
        transform 0.22s cubic-bezier(.2, .8, .2, 1),
        box-shadow 0.22s cubic-bezier(.2, .8, .2, 1),
        background 0.22s ease,
        border-color 0.22s ease;
    }



    /* =========================
   SVG ICON STYLE
   ========================= */

    .image-rotate-handle svg {

      width: 16px;
      height: 16px;

      color: rgba(255, 255, 255, 0.9);

      transition:
        transform 0.35s cubic-bezier(.2, .8, .2, 1),
        color 0.25s ease;
    }



    /* =========================
   HOVER STATE
   ========================= */

    .image-rotate-handle:hover {

      transform: translateY(-2px) scale(1.04);

      background: linear-gradient(145deg,
          rgba(255, 255, 255, 0.14),
          rgba(255, 255, 255, 0.04));

      border-color: rgba(255, 255, 255, 0.18);

      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .image-rotate-handle:hover svg {
      transform: rotate(20deg);
    }

    .image-rotate-handle::before {
      content: "";
      position: absolute;
      inset: 0;

      border-radius: inherit;

      background: radial-gradient(circle at 30% 30%,
          rgba(255, 255, 255, 0.25),
          transparent 60%);

      opacity: 0.35;
      pointer-events: none;
    }

    /* =========================
   ROTATE SVG BASE
   ========================= */

    .image-rotate-handle svg {
      transform-origin: center;
      will-change: transform;
    }



    /* =========================
   CLOCKWISE ROTATION
   ========================= */

    .image-rotate-handle.rotating-cw svg {
      animation: rotateCW 1s linear infinite;
    }

    @keyframes rotateCW {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }



    /* =========================
   ANTICLOCKWISE ROTATION
   ========================= */

    .image-rotate-handle.rotating-ccw svg {
      animation: rotateCCW 1s linear infinite;
    }

    @keyframes rotateCCW {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(-360deg);
      }
    }




    /* =========================
   ACTIVE / DRAG STATE
   ========================= */

    .image-rotate-handle:active {

      cursor: grabbing;

      transform: scale(0.96);

      box-shadow:
        0 4px 10px rgba(0, 0, 0, 0.35) inset;
    }

    .image-rotate-handle:active svg {
      transform: rotate(120deg) scale(0.95);
    }



    /* =========================
   FOCUS ACCESSIBILITY
   ========================= */

    .image-rotate-handle:focus-visible {

      outline: none;

      box-shadow:
        0 0 0 2px rgba(99, 102, 241, 0.6),
        0 6px 18px rgba(0, 0, 0, 0.25);
    }



    .image-item.selected .image-rotate-handle {
      display: block;
    }


    /* show only when selected */
    .image-item.selected .image-rotate-handle {
      display: block;
    }


    .image-rotate-handle {
      touch-action: none;
      /* 🔥 REQUIRED for touch rotation */
    }

    .page.rotated #textLayer,
    .page.rotated #imageLayer,
    .page.rotated #drawCanvas,
    .page.rotated #eraseCanvas {
      pointer-events: none;
      cursor: not-allowed;
    }

    /* =========================
   UPLOAD OVERLAY
   ========================= */

    .upload-overlay {
      position: fixed;
      inset: 0;
      z-index: 9998;

      display: none;
      align-items: center;
      justify-content: center;

      background:
        radial-gradient(circle at 30% 20%, rgba(79, 70, 229, .15), transparent 60%),
        radial-gradient(circle at 70% 80%, rgba(34, 197, 94, .15), transparent 60%),
        rgba(15, 23, 42, 0.65);

      backdrop-filter: blur(14px);
      opacity: 1;
      pointer-events: auto;

      transition: opacity .45s ease, transform .45s ease;
    }

    .upload-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .upload-card {
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border-radius: 22px;
      padding: 36px 34px;
      text-align: center;

      width: min(92vw, 420px);

      box-shadow:
        0 40px 90px rgba(0, 0, 0, .35),
        inset 0 0 0 1px rgba(255, 255, 255, .6);

      animation: floatIn .8s cubic-bezier(.2, .8, .2, 1);
    }

    @keyframes floatIn {
      from {
        transform: translateY(30px) scale(.95);
        opacity: 0;
      }

      to {
        transform: none;
        opacity: 1;
      }
    }

    .upload-icon {
      width: 84px;
      height: 84px;
      margin: 0 auto 18px;

      border-radius: 22px;

      background:
        linear-gradient(135deg, #6a5cff, #4f46e5);

      display: grid;
      place-items: center;

      color: white;
      font-size: 36px;
      font-weight: 700;

      box-shadow:
        0 20px 40px rgba(79, 70, 229, .45);

      animation: pulse 2.2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(79, 70, 229, .45);
      }

      70% {
        box-shadow: 0 0 0 18px rgba(79, 70, 229, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(79, 70, 229, 0);
      }
    }

    .upload-card h2 {
      margin: 12px 0 6px;
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
    }

    .upload-card p {
      margin: 0 0 22px;
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
    }

    .overlay-upload-btn {
      width: 100%;
      height: 48px;

      border-radius: 14px;

      background: linear-gradient(135deg, #22c55e, #16a34a);

      font-size: 15px;
      font-weight: 700;
      cursor: pointer;

      box-shadow: 0 7px 15px rgba(34, 197, 94, .45);

      transition: transform .15s ease, box-shadow .15s ease;
    }

    .overlay-upload-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(34, 197, 94, .55);
    }

    .overlay-upload-btn:active {
      transform: translateY(0);
    }

    .upload-hint {
      display: block;
      margin-top: 14px;
      font-size: 12px;
      color: #64748b;
    }

    /* =========================
   PDF LOADING PROGRESS
   ========================= */

    .upload-progress {
      margin-top: 22px;
    }

    .upload-progress.hidden {
      display: none;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;

      background: linear-gradient(90deg,
          #4f46e5,
          #22c55e);

      transition: width .25s ease;
    }

    .progress-text {
      margin-top: 10px;
      font-size: 12px;
      color: #475569;
      text-align: center;
    }

    #imageLayer {
      touch-action: none;
      /* 🔥 ALLOW TOUCH DRAG */
    }

    .image-item {
      touch-action: none;
      /* 🔥 ALLOW TOUCH DRAG */
    }

    @media (max-width: 475px) {
      .tf-inner {
        transform: scale(0.8);
      }
    }

    @media (max-width: 375px) {
      .tf-inner {
        transform: scale(0.7);
      }
    }

    @media (max-width: 324px) {
      .tf-inner {
        transform: scale(0.65);
      }
    }

    /* ===== Image Bottom Controls ===== */
    .image-bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      transition: 0.25s ease;
      width: 100px;
      height: 50px;
    }

    .image-bottom-bar.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    /* delete button */
    .image-delete-btn {
      border: none;
      background: linear-gradient(135deg, #ff4a4a, #ff1f1f);
      color: white;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(255, 0, 0, 0.35);

    }

    .image-item .image-delete-btn {
      display: none;
    }

    .thumb {
      position: relative;
    }

    /* DELETE BUTTON */
    .thumb-delete {
      position: absolute;
      top: 6px;
      right: 6px;

      width: 20px;
      height: 20px;

      border: none;
      border-radius: 50%;

      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 12px;
      cursor: pointer;

      display: flex;
      align-items: center;
      justify-content: center;

      opacity: 0;
      transition: 0.2s;
    }

    .thumb:hover .thumb-delete {
      opacity: 1;
    }
  </style>
</head>

      <button class="railbtn active" id="notool" style="background: #111827;" data-passive="true" title="Info"
        aria-label="Info">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2v20M2 12h20" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          <path d="M12 2l-3 3M12 2l3 3M12 22l-3-3M12 22l3-3M2 12l3-3M2 12l3 3M22 12l-3-3M22 12l-3 3"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>


      <div class="spacer"></div>

      <button class="railbtn" title="Sign" aria-label="Sign">
        <i class="fa-solid fa-signature"></i>
      </button>

    </aside>

    <!-- Thumbnails -->
    <aside class="thumbs" aria-label="Pages" id="thumbs"></aside>


    <!-- Main Viewer -->
    <section class="viewer" aria-label="Preview">
      <div class="viewerbar">
        <div class="group">
          <div class="seg" aria-label="Prev / Next">
            <button id="prevBtn" title="Previous" aria-label="Previous">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M15 18l-6-6 6-6" stroke="#111827" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
            <button id="nextBtn" title="Next" aria-label="Next">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M9 6l6 6-6 6" stroke="#111827" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
          </div>

          <div class="pill" aria-label="Page indicator">
            <span id="pageNow">1</span>
            <span class="muted">/</span>
            <span id="pageTotal">2</span>
          </div>
        </div>

        <div class="group">
          <div class="seg" aria-label="Zoom">
            <button id="zoomOut" title="Zoom out" aria-label="Zoom out">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M5 12h14" stroke="#111827" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>

            <button id="zoomIn" title="Zoom in" aria-label="Zoom in">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M12 5v14M5 12h14" stroke="#111827" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
          </div>

          <div class="pill" style="min-width:92px">
            <span class="zoomval" id="zoomLabel">100%</span>
          </div>
        </div>
      </div>

      <div class="stage" id="stage">
        <!-- FIXED canvas size (612x792) with scrollable stage -->
        <div class="page" id="page">
          <canvas id="pdfCanvas"></canvas> <!-- PDF render ONLY -->
          <canvas id="drawCanvas"></canvas> <!-- Pen -->
          <canvas id="eraseCanvas"></canvas> <!-- Eraser -->
          <div id="imageLayer"></div>
          <div id="textLayer"></div>
        </div>


      </div>
    </section>

    <!-- Text Toolbar (bottom-center) -->
    <div class="text-floatbar" id="textBar" aria-hidden="true">
      <div class="tf-inner">
        <button class="tf-btn" type="button" data-cmd="bold" title="Bold" aria-label="Bold"><b>B</b></button>
        <button class="tf-btn" type="button" data-cmd="italic" title="Italic" aria-label="Italic"><i>I</i></button>
        <div class="tf-sep"></div>

        <!-- FONT COLOR -->
        <div class="tf-pop">
          <button class="tf-btn tf-colorbtn" id="fontColorBtn" type="button" title="Font color">
            <span class="tf-a">A</span>
            <span class="tf-swatch" id="fontColorSwatch"></span>
          </button>

          <div class="tf-popover" id="fontColorPop">
            <div class="tf-popgrid">
              <button style="background-color:#111827;" class="tf-chip" data-color="#111827"></button>
              <button style="background-color:#ef4444;" class="tf-chip" data-color="#ef4444"></button>
              <button style="background-color:#22c55e;" class="tf-chip" data-color="#22c55e"></button>
              <button style="background-color:#3b82f6;" class="tf-chip" data-color="#3b82f6"></button>
              <button style="background-color:#a855f7;" class="tf-chip" data-color="#a855f7"></button>
              <button style="background-color:#f59e0b;" class="tf-chip" data-color="#f59e0b"></button>
            </div>
            <input type="color" id="fontColorInput" value="#111827">
          </div>
        </div>

        <!-- BACKGROUND COLOR -->
        <div class="tf-pop">
          <button class="tf-btn tf-colorbtn" id="bgColorBtn" type="button" title="Background color">
            🖍
            <span class="tf-swatch" id="bgColorSwatch"></span>
          </button>

          <div class="tf-popover" id="bgColorPop">
            <div class="tf-popgrid">
              <button style="background-color:transparent;" class="tf-chip" data-color="transparent"></button>
              <button style="background-color:#fef3c7;" class="tf-chip" data-color="#fef3c7"></button>
              <button style="background-color:#dcfce7;" class="tf-chip" data-color="#dcfce7"></button>
              <button style="background-color:#dbeafe;" class="tf-chip" data-color="#dbeafe"></button>
              <button style="background-color:#ede9fe;" class="tf-chip" data-color="#ede9fe"></button>
            </div>
            <input type="color" id="bgColorInput" value="#fef3c7">
          </div>
        </div>


        <div class="tf-sep"></div>

        <label class="tf-field" title="Font">
          <span class="tf-ico">Aa</span>
          <select id="fontFamilySelect">
            <option style="font-family:Arial, Helvetica, sans-serif ;" value="Arial"></option>
            <option style="font-family:Inter, ui-sans-serif, system-ui ;" value="Inter, ui-sans-serif, system-ui">Inter
            </option>
            <option style="font-family: Georgia, 'Times New Roman', serif;" value="Georgia, 'Times New Roman', serif">
              Georgia</option>
            <option style="font-family:Times New Roman, Times, serif ;" value="'Times New Roman', Times, serif">Times
            </option>
            <option style="font-family: Courier New, Courier, monospace;" value="'Courier New', Courier, monospace">
              Courier</option>
            <option style="font-family: Verdana, Geneva, sans-serif ;" value="Verdana, Geneva, sans-serif">Verdana
            </option>
          </select>
        </label>

        <label class="tf-field" title="Size">
          <span class="tf-ico"></span>
          <select id="fontSizeSelect">
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="14" selected>14</option>
            <option value="16">16</option>
            <option value="18">18</option>
            <option value="24">24</option>
            <option value="32">32</option>
          </select>
        </label>

        <label class="tf-field" title="Underline">
          <span class="tf-ico">U</span>
          <select id="underlineSelect">
            <option value="none" selected>None</option>
            <option value="single">Underline</option>
            <option value="double">Double</option>
            <option value="dotted">Dotted</option>
          </select>
        </label>
      </div>
    </div>

  </main>
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Upload Overlay -->
  <div id="uploadOverlay" class="upload-overlay">
    <div class="upload-card">
      <div class="upload-icon">
        ⬆
      </div>

      <h2>Upload your PDF</h2>
      <p>Drag & drop your file here<br>or click below to browse</p>

      <button id="overlayUploadBtn" class="overlay-upload-btn">
        Choose PDF
      </button>

      <div id="uploadProgress" class="upload-progress hidden">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <div class="progress-text">Loading PDF…</div>
      </div>

      <span class="upload-hint">PDF files only • Max quality preserved</span>

    </div>
  </div>


  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="editor.bundle.js"></script>
</body>

</html>
